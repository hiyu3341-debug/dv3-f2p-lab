<article class="tool-card"><h3>天井までのダイヤ計算</h3><label>現在のガチャポイント<input id="pityInput" type="number" min="0" max="200" value="0"></label><button id="calcPity" class="btn primary">計算</button><div id="pityResult" class="result">200ポイントまで残り200連・60,000ダイヤ</div></article>
