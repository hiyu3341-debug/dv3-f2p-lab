<nav class="breadcrumb"><a href="index.html">ホーム</a><span>›</span><span>ドラゴン図鑑</span></nav>
<section class="dragon-catalog-hero">
<div><p class="eyebrow">DRAGON DATABASE / VER.5.0</p><h1>ドラゴン図鑑</h1><p>画像・能力・固有アビリティを、スマートフォンで素早く比較できるコンパクト図鑑です。</p></div>
<div class="catalog-summary"><article><span>登録ドラゴン数</span><strong id="registeredCount">30<small>体</small></strong></article><article><span>実測データ数</span><strong>30<small>体</small></strong></article></div>
</section>
<section class="section dragon-catalog-section">
<div class="catalog-filter-panel">
<label class="catalog-search"><span>キーワード検索</span><input id="searchInput" type="search" placeholder="名前・アビリティ・効果で検索" autocomplete="off"></label>
<div class="catalog-filter-grid">
<label><span>レア度</span><select id="rarityFilter"><option value="all">すべて</option><option value="Epic">Epic</option><option value="Legendary">Legendary</option><option value="Rare">Rare</option></select></label>
<label><span>役割</span><select id="roleFilter"><option value="all">すべて</option><option value="physical">物理</option><option value="magic">魔法</option><option value="defense">防御</option><option value="support">支援</option></select></label>
<label><span>並び順</span><select id="sortFilter"><option value="default">登録順</option><option value="name">名前順</option><option value="hp">HP順</option><option value="atk">攻撃順</option><option value="def">防御順</option><option value="mag">魔法順</option><option value="res">抵抗順</option><option value="spd">速度順</option></select></label>
</div>
<button id="resetFilters" class="catalog-reset" type="button">条件をリセット</button>
</div>
<div id="dragonGrid" class="dragon-list" aria-live="polite"></div>
<p id="noResults" class="no-results" hidden>条件に一致するドラゴンが見つかりませんでした。</p>
<div class="catalog-pagination"><span id="resultCount"></span><div class="pagination-buttons"><button id="prevPage" aria-label="前のページ">‹</button><span id="pageNumbers"></span><button id="nextPage" aria-label="次のページ">›</button></div><label><span>表示件数</span><select id="pageSize"><option value="10">10体</option><option value="20" selected>20体</option><option value="50">すべて</option></select></label></div>
</section>
</main>
