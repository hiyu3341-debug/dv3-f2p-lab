<section class="v5-intro">
<div><p class="v5-kicker">DRAGON DATABASE · Ver.5.0 β</p><h1>ドラゴン図鑑</h1><p>画像と主要情報を、スマートフォンで素早く確認できるコンパクト一覧です。</p></div>
<div class="v5-counts"><div><span>登録ドラゴン数</span><strong id="registeredCount">0<small>体</small></strong></div><div><span>実測データ数</span><strong id="measuredCount">0<small>体</small></strong></div></div>
</section>
<section class="v5-controls" aria-label="検索と絞り込み">
<label class="v5-search"><span class="sr-only">キーワード検索</span><input id="searchInput" type="search" placeholder="名前・アビリティ・効果で検索" autocomplete="off"></label>
<div class="v5-filter-grid">
<label><span>レア度</span><select id="rarityFilter"><option value="all">すべて</option><option value="Epic">Epic</option><option value="Legendary">Legendary</option><option value="Rare">Rare</option></select></label>
<label><span>役割</span><select id="roleFilter"><option value="all">すべて</option><option value="physical">物理</option><option value="magic">魔法</option><option value="defense">防御</option><option value="support">支援</option></select></label>
<label><span>並び順</span><select id="sortFilter"><option value="registered">登録順</option><option value="name">名前順</option><option value="hp">HP順</option><option value="atk">攻撃順</option><option value="def">防御順</option><option value="mag">魔法順</option><option value="res">抵抗順</option><option value="spd">速度順</option></select></label>
</div>
<button id="resetFilters" class="v5-reset" type="button">条件をリセット</button>
</section>
<div class="v5-result-line"><span id="resultSummary"></span><label>表示件数 <select id="pageSize"><option value="10">10体</option><option value="20" selected>20体</option><option value="999">すべて</option></select></label></div>
<section id="dragonList" class="v5-dragon-list" aria-live="polite"></section>
<p id="noResults" class="v5-empty" hidden>条件に一致するドラゴンが見つかりませんでした。</p>
